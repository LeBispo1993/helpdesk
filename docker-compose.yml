services:
    db:
        image: postgres:14-alpine
        container_name: postgres_container
        env_file:
            - ./db.env
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - '2345:5432'
        networks:
            - glpi_grafmarques
        restart: on-failure:2
    back:
        build: ./back
        container_name: back_container
        depends_on:
            - db
        env_file:
            - ./db.env
            - ./back/.env
        ports:
            - '8080:8081'
        networks:
            - glpi_grafmarques
        restart: on-failure:2
    front:
        build: ./front
        container_name: front_container
        depends_on:
            - back
        env_file:
            - ./front/.env
        ports:
            - '3000:3000'
        networks:
            - glpi_grafmarques
        restart: on-failure:2

volumes:
    postgres_data: {}

networks:
    glpi_grafmarques:
