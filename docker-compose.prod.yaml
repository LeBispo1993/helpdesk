services:
    db:
        image: postgres:14-alpine
        container_name: postgres
        env_file:
            - ./db.env
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - '2345:5432'
        networks:
            - app
        restart: always
    back:
        build: ./back
        container_name: back
        depends_on:
            - db
        env_file:
            - ./db.env
            - ./back/.env
        ports:
            - '8080:8081'
        networks:
            - app
        restart: always
    front:
        build: ./front
        container_name: front
        depends_on:
            - back
        env_file:
            - ./front/.env
        ports:
            - '3000:3000'
        networks:
            - app
        restart: always

volumes:
    postgres_data: {}

networks:
    app:
